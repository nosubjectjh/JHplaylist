<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>취향의 재현</title>
    <!-- 폰트: Instagram 실제 사용 시스템 폰트 스택 (SF Pro / Apple SD Gothic Neo / Roboto) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Diphylleia&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg:           #FFFFFF;
            --box:          #FAFAFA;
            --accent:       #262626;
            --accent-light: #737373;
            --text:         #262626;
            --muted:        #737373;
            --border:       #DBDBDB;
            --divider:      #DBDBDB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #FAFAFA;
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px 0 40px;
        }

        /* ═══════════════════════════════
           CARD (Instagram phone frame)
        ═══════════════════════════════ */
        .insta-card {
            width: 100%;
            max-width: 390px;
            background-color: var(--bg);
            position: relative;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .insta-card::before { display: none; }

        /* ═══════════════════════════════
           TOP BAR
        ═══════════════════════════════ */
        .insta-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px 10px;
            border-bottom: 1px solid var(--divider);
            position: relative;
            z-index: 20;
            background-color: var(--bg);
        }
        .insta-logo {
            font-family: 'Diphylleia', serif;
            font-size: 22px;
            font-weight: normal;
            color: #000000;
            letter-spacing: 0.3px;
            line-height: 1;
        }
        .topbar-icons {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            opacity: 0.85;
            transition: opacity 0.15s;
        }
        .icon-btn:hover { opacity: 1; }

        /* ═══════════════════════════════
           HAMBURGER DROPDOWN
        ═══════════════════════════════ */
        .hamburger-dropdown {
            display: none;
            position: absolute;
            top: 48px;
            right: 12px;
            background-color: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            min-width: 150px;
        }
        .hamburger-dropdown.open { display: block; }
        .dropdown-label {
            padding: 10px 14px 6px;
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        .lang-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: background 0.12s;
            border-top: 1px solid var(--divider);
        }
        .lang-option:hover { background: #F5F5F5; }
        .lang-option.active { color: #0095F6; }
        .lang-flag { font-size: 16px; line-height: 1; }

        /* ═══════════════════════════════
           PROFILE SECTION
        ═══════════════════════════════ */
        .profile-section {
            display: flex;
            align-items: center;
            padding: 14px 14px 10px;
            gap: 12px;
        }

        /* profile picture with gold ring */
        .profile-pic-wrap {
            position: relative;
            flex-shrink: 0;
            cursor: pointer;
            width: 80px;
            height: 80px;
        }
        .profile-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            z-index: 0;
        }
        .profile-inner {
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background-color: #FFFFFF;
            z-index: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-inner img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
            position: relative;
            z-index: 2;
        }
        .profile-placeholder {
            color: #DBDBDB;
            font-size: 22px;
            opacity: 1;
            font-weight: 300;
            pointer-events: none;
            z-index: 2;
        }

        /* stats */
        .profile-stats-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .profile-stats {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .stat-num {
            font-size: 16px;
            font-weight: 900;
            color: var(--text);
            line-height: 1.2;
        }
        .stat-label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 400;
        }

        /* ═══════════════════════════════
           BIO / USERNAME
        ═══════════════════════════════ */
        .profile-bio {
            padding: 0 14px 12px;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }
        .username-input {
            background: transparent;
            border: none;
            outline: none;
            font-size: 13px;
            font-weight: 900;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            width: 100%;
            min-width: 0;
            text-align: right;
        }
        .username-input::placeholder { color: #AAAAAA; font-weight: 400; }
        .username-input:-webkit-autofill,
        .username-input:-webkit-autofill:hover,
        .username-input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px #FFFFFF inset !important;
            -webkit-text-fill-color: #262626 !important;
        }
        .bio-suffix {
            font-size: 13px;
            font-weight: 600;
            color: #262626;
            white-space: nowrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* ═══════════════════════════════
           HIGHLIGHTS (My Favorite)
        ═══════════════════════════════ */
        .highlights-row {
            display: flex;
            align-items: center;
            padding: 6px 14px 10px;
            gap: 14px;
            border-bottom: 1px solid var(--divider);
        }
        .highlight-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }
        .highlight-song-right {
            font-size: 13px;
            font-weight: 700;
            color: #262626;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
            flex: 1;
        }
        .highlight-ring-wrap {
            width: 62px;
            height: 62px;
            position: relative;
            cursor: pointer;
        }
        .highlight-ring-outer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }
        .highlight-ring-inner {
            position: absolute;
            inset: 2.5px;
            border-radius: 50%;
            background-color: #FFFFFF;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .highlight-art {
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-color: var(--box);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .highlight-art-placeholder {
            color: #DBDBDB;
            font-size: 18px;
            opacity: 1;
        }
        .highlight-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            max-width: 62px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }


        /* ═══════════════════════════════
           TAB ROW (grid / tag icon)
        ═══════════════════════════════ */
        .tab-row {
            display: flex;
            border-bottom: 1px solid var(--divider);
        }
        .tab-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 9px 0;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--muted);
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .tab-btn.active {
            color: #262626;
            border-bottom-color: #262626;
        }

        /* ═══════════════════════════════
           GRID
        ═══════════════════════════════ */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background-color: #DBDBDB;
        }
        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            background-color: var(--bg);
            min-width: 0;
        }
        .tag {
            font-size: 10px;
            font-weight: 700;
            color: #737373;
            padding: 4px 5px 3px;
            text-align: center;
            letter-spacing: 0.1px;
        }
        .album-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--box);
            cursor: pointer;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: filter 0.15s;
        }
        .album-art:hover { filter: brightness(1.1); }
        .tag-icon-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 300;
            opacity: 0.4;
            pointer-events: none;
            color: #AAAAAA;
            transition: opacity 0.2s;
        }
        .album-art:hover .tag-icon-overlay { opacity: 0.65; }
        .album-art.has-image .tag-icon-overlay { display: none; }
        .song-title {
            font-size: 9.5px;
            font-weight: 700;
            color: var(--text);
            padding: 3px 5px 5px;
            text-align: center;
            min-height: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background-color: var(--bg);
        }

        /* ═══════════════════════════════
           BOTTOM NAV
        ═══════════════════════════════ */
        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px 0 12px;
            border-top: 1px solid var(--divider);
            background-color: var(--bg);
        }
        .nav-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            transition: color 0.15s;
        }
        .nav-btn:hover { color: var(--text); }
        .nav-btn.nav-camera {
            color: #262626;
            background: rgba(0,0,0,0.06);
            border-radius: 50%;
            padding: 8px;
        }
        .nav-btn.nav-camera:hover { background: rgba(0,0,0,0.1); }

        /* ═══════════════════════════════
           SEARCH MODAL
        ═══════════════════════════════ */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: flex-start;
            padding-top: 10vh;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background: #FFFFFF;
            padding: 22px;
            border-radius: 14px;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            border: 1px solid #DBDBDB;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .modal-title {
            font-size: 14px;
            font-weight: 900;
            color: #262626;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }
        .modal-title em {
            color: #737373;
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
        }
        .search-bar { margin-bottom: 10px; }
        .search-bar input {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid #DBDBDB;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #FAFAFA;
            color: #262626;
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-bar input:focus {
            border-color: #AAAAAA;
            box-shadow: none;
        }
        .search-bar input::placeholder { color: #AAAAAA; }
        .results-container {
            max-height: 40vh;
            overflow-y: auto;
            border: 1px solid #DBDBDB;
            border-radius: 8px;
            display: none;
            scrollbar-width: thin;
            scrollbar-color: #DBDBDB transparent;
        }
        .results-container::-webkit-scrollbar { width: 4px; }
        .results-container::-webkit-scrollbar-thumb { background: #DBDBDB; border-radius: 2px; }
        .result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-bottom: 1px solid #EFEFEF;
            cursor: pointer;
            transition: background 0.12s;
        }
        .result-item:hover { background: #FAFAFA; }
        .result-item:last-child { border-bottom: none; }
        .result-item img { width: 40px; height: 40px; border-radius: 5px; flex-shrink: 0; }
        .result-item-title { font-weight: 700; font-size: 13px; color: #262626; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .result-item-artist { color: #737373; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .close-btn {
            margin-top: 12px;
            padding: 10px;
            background: #FAFAFA;
            border: 1px solid #DBDBDB;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            color: #737373;
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 13px;
            transition: background 0.15s, color 0.15s;
        }
        .close-btn:hover { background: #F0F0F0; color: #262626; }

        /* saving overlay on camera btn */
        .nav-btn.saving { opacity: 0.5; pointer-events: none; }

        .anniversary-text {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 11px;
            font-style: italic;
            color: #737373;
            text-align: center;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        /* copyright */
        .copyright {
            margin-top: 12px;
            font-size: 10px;
            color: #AAAAAA;
            text-align: center;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

<div class="insta-card" id="captureArea">

    <!-- ── TOP BAR ── -->
    <div class="insta-topbar">
        <div class="insta-logo">취향의 재현</div>
        <div class="topbar-icons">
            <!-- hamburger -->
            <button class="icon-btn" onclick="toggleMenu(event)" aria-label="메뉴">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
        </div>

        <!-- dropdown (inside topbar so z-index stacks correctly) -->
        <div class="hamburger-dropdown" id="hamburgerMenu">
            <div class="dropdown-label">Language</div>
            <div class="lang-option active" onclick="setLang('ko')">
                <span class="lang-flag">🇰🇷</span> 한국어
            </div>
            <div class="lang-option" onclick="setLang('en')">
                <span class="lang-flag">🇺🇸</span> English
            </div>
            <div class="lang-option" onclick="setLang('zh')">
                <span class="lang-flag">🇨🇳</span> 中文
            </div>
            <div class="lang-option" onclick="setLang('ja')">
                <span class="lang-flag">🇯🇵</span> 日本語
            </div>
        </div>
    </div>

    <!-- ── PROFILE ── -->
    <div class="profile-section">
        <label class="profile-pic-wrap" for="profileInput">
            <div class="profile-ring"></div>
            <div class="profile-inner">
                <img id="profilePreview" alt="profile">
                <span class="profile-placeholder" id="profilePlaceholder">+</span>
            </div>
            <input type="file" id="profileInput" accept="image/*" style="display:none" onchange="loadProfilePic(event)">
        </label>
        <div class="profile-stats-wrap">
            <div class="anniversary-text">Happy 10th Anniversary</div>
        <div class="profile-stats">
            <div class="stat">
                <span class="stat-num">9</span>
                <span class="stat-label">songs</span>
            </div>
            <div class="stat">
                <span class="stat-num">127</span>
                <span class="stat-label">squad</span>
            </div>
            <div class="stat">
                <span class="stat-num">77</span>
                <span class="stat-label">No.</span>
            </div>
        </div>
        </div>
    </div>

    <!-- ── BIO / USERNAME ── -->
    <div class="profile-bio">
        <input class="username-input" id="usernameInput" placeholder="username" maxlength="30" autocomplete="off">
        <span class="bio-suffix">'s Playlist</span>
    </div>

    <!-- ── HIGHLIGHTS ── -->
    <div class="highlights-row">
        <div class="highlight-item">
            <div class="highlight-ring-wrap" onclick="openSearchModal('highlight-art','highlight-song-title')">
                <div class="highlight-ring-outer"></div>
                <div class="highlight-ring-inner">
                    <div class="highlight-art" id="highlight-art">
                        <span class="highlight-art-placeholder">♪</span>
                    </div>
                </div>
            </div>
            <div class="highlight-label">My Favorite</div>
        </div>
        <div class="highlight-song-right" id="highlight-song-title"></div>
    </div>

    <!-- ── TAB ROW ── -->
    <div class="tab-row">
        <button class="tab-btn active">
            <!-- grid icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <rect x="3"  y="3"  width="7" height="7" rx="1"/>
                <rect x="14" y="3"  width="7" height="7" rx="1"/>
                <rect x="3"  y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </button>
        <button class="tab-btn">
            <!-- tag icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.59 13.41L13.42 20.58a2 2 0 0 1-2.83 0L3 13V3h10l7.59 7.59a2 2 0 0 1 0 2.82z"/>
                <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
        </button>
    </div>

    <!-- ── GRID ── -->
    <div class="grid" id="gridContainer"></div>

    <!-- ── BOTTOM NAV ── -->
    <div class="bottom-nav">
        <!-- home -->
        <button class="nav-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                <polyline points="9 21 9 12 15 12 15 21"/>
            </svg>
        </button>
        <!-- search -->
        <button class="nav-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
            </svg>
        </button>
        <!-- camera (save) -->
        <button class="nav-btn nav-camera" id="cameraBtn" onclick="downloadImage()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        </button>
        <!-- heart -->
        <button class="nav-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
        </button>
        <!-- profile -->
        <button class="nav-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </button>
    </div>

</div><!-- /insta-card -->

<!-- ⚠️ 아래 닉네임을 원하는 텍스트로 변경하세요 -->
<div class="copyright">ⓒ nosubjectjh</div>

<!-- ── SEARCH MODAL ── -->
<div class="modal" id="searchModal">
    <div class="modal-content">
        <h3 class="modal-title">재현 노래 검색</h3>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="노래 제목 입력" oninput="debounceSearch()">
        </div>
        <div class="results-container" id="resultsList"></div>
        <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>
</div>

<script>
    // ══════════════════════════════════
    //  다국어 데이터
    // ══════════════════════════════════
    const i18n = {
        ko: {
            title:       '취향의 재현',
            searchTitle: '재현 노래 검색',
            placeholder: '노래 제목 입력',
            noResult:    '재현 관련 곡이 없습니다.',
            searching:   '검색 중...',
            error:       '오류가 발생했습니다.',
            close:       '닫기',
            usernamePH:  'username',
            tags: ['#청량','#설렘','#벅참','#신남','#네오','#슬픔','#중독성','#강렬','#퍼포먼스'],
        },
        en: {
            title:       '취향의 재현',
            searchTitle: 'Search JAEHYUN',
            placeholder: 'Enter song title',
            noResult:    'No results found.',
            searching:   'Searching...',
            error:       'An error occurred.',
            close:       'Close',
            usernamePH:  'username',
            tags: ['#Refreshing','#Fluttering','#Overwhelming','#Exciting','#Neo','#Sad','#Addictive','#Intensity','#Performance'],
        },
        zh: {
            title:       '취향의 재현',
            searchTitle: '搜索在玹的歌曲',
            placeholder: '输入歌曲名称',
            noResult:    '没有找到相关歌曲。',
            searching:   '搜索中...',
            error:       '发生错误。',
            close:       '关闭',
            usernamePH:  '输入名字',
            tags: ['#清爽','#心动','#感动','#兴奋','#Neo','#悲伤','#中毒性','#强烈','#舞台感'],
        },
        ja: {
            title:       '취향의 재현',
            searchTitle: 'ジェヒョンの曲を検索',
            placeholder: '曲名を入力',
            noResult:    '曲が見つかりません。',
            searching:   '検索中...',
            error:       'エラーが発生しました。',
            close:       '閉じる',
            usernamePH:  '名前を入力',
            tags: ['#清涼','#ときめき','#感動','#楽しい','#ネオ','#切ない','#中毒性','#強烈','#パフォーマンス'],
        },
    };

    const icons = ['❄','✿','★','⚡','◈','☾','♬','✦','♔'];
    let currentLang = 'ko';

    // ⚠️ Cloudflare Worker 배포 후 실제 URL로 교체
    const WORKER_URL = 'https://jaehyun-proxy.nosubjectforjh.workers.dev';

    let currentBoxId   = '';
    let currentTitleId = '';
    let searchTimeout  = null;

    // ── 그리드 초기화 ──
    function initGrid() {
        const grid = document.getElementById('gridContainer');
        icons.forEach((icon, i) => {
            const boxId   = `box-${i}`;
            const titleId = `title-${i}`;
            grid.innerHTML += `
                <div class="grid-item">
                    <div class="tag" id="tag-${i}">${i18n[currentLang].tags[i]}</div>
                    <div class="album-art" id="${boxId}" onclick="openSearchModal('${boxId}','${titleId}')">
                        <div class="tag-icon-overlay">+</div>
                    </div>
                    <div class="song-title" id="${titleId}"></div>
                </div>`;
        });
    }

    // ── 프로필 이미지 ──
    function loadProfilePic(event) {
        const reader = new FileReader();
        reader.onload = () => {
            const img = document.getElementById('profilePreview');
            img.src = reader.result;
            img.style.display = 'block';
            document.getElementById('profilePlaceholder').style.display = 'none';
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    // ── 햄버거 메뉴 토글 ──
    function toggleMenu(e) {
        e.stopPropagation();
        document.getElementById('hamburgerMenu').classList.toggle('open');
    }
    document.addEventListener('click', () => {
        document.getElementById('hamburgerMenu').classList.remove('open');
    });

    // ── 언어 선택 ──
    function setLang(lang) {
        currentLang = lang;
        const t = i18n[lang];

        // 드롭다운 active 표시
        document.querySelectorAll('.lang-option').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('hamburgerMenu').classList.remove('open');

        // 태그 텍스트 업데이트
        icons.forEach((_, i) => {
            const el = document.getElementById(`tag-${i}`);
            if (el) el.innerText = t.tags[i];
        });

        // 검색 모달 placeholder & 버튼
        document.getElementById('searchInput').placeholder = t.placeholder;
        document.querySelector('.close-btn').innerText = t.close;
        document.querySelector('.modal-title').innerHTML =
            `${t.searchTitle}&nbsp;&nbsp;<em>JAEHYUN</em>`;

        // username placeholder
        document.getElementById('usernameInput').placeholder = t.usernamePH;
    }

    // ── 모달 ──
    function openSearchModal(boxId, titleId) {
        currentBoxId   = boxId;
        currentTitleId = titleId;
        document.getElementById('searchInput').value = '';
        document.getElementById('resultsList').innerHTML = '';
        document.getElementById('resultsList').style.display = 'none';
        document.getElementById('searchModal').style.display = 'flex';
        setTimeout(() => document.getElementById('searchInput').focus(), 100);
    }
    function closeModal() {
        document.getElementById('searchModal').style.display = 'none';
    }

    // ── 검색 ──
    function debounceSearch() {
        clearTimeout(searchTimeout);
        const query = document.getElementById('searchInput').value.trim();
        const resultsList = document.getElementById('resultsList');
        if (!query) {
            resultsList.style.display = 'none';
            resultsList.innerHTML = '';
            return;
        }
        searchTimeout = setTimeout(() => executeSearch(query), 500);
    }

    function executeSearch(query) {
        const resultsList = document.getElementById('resultsList');
        resultsList.style.display = 'block';
        resultsList.innerHTML = `<div style="padding:13px;text-align:center;font-size:13px;color:#737373;">${i18n[currentLang].searching}</div>`;

        const searchTerm = encodeURIComponent(`JAEHYUN ${query}`);
        fetch(`${WORKER_URL}?term=${searchTerm}`)
            .then(r => r.json())
            .then(data => {
                resultsList.innerHTML = '';
                // 재현이 피처링/듀엣으로 참여한 곡 제목 화이트리스트
                const titleWhitelist = ['try again'];

                const filtered = (data.results || []).filter(song => {
                    const artist = song.artistName.toUpperCase().replace(/\s+/g, ' ').trim();
                    const title  = song.trackName.toLowerCase().trim();

                    const isJaehyunRelated =
                        artist.includes('JAEHYUN') ||
                        artist.includes('재현') ||
                        artist.includes('NCT DOJAEJUNG') ||
                        artist.includes('NCT 도재정') ||
                        artist.includes('NCT 127') ||
                        artist.includes('NCT U') ||
                        artist.includes('차민호') ||
                        artist.includes('D.EAR') ||
                        artist.includes('디어') ||
                        artist === 'NCT' ||
                        titleWhitelist.some(t => title.includes(t));

                    const isExcluded =
                        artist.includes('NCT DREAM') ||
                        artist.includes('WAYV') ||
                        artist.includes('WAY V') ||
                        artist.includes('NCT WISH') ||
                        artist === 'WISH';
                    return isJaehyunRelated && !isExcluded;
                }).slice(0, 25);

                if (!filtered.length) {
                    resultsList.innerHTML = `<div style="padding:13px;text-align:center;font-size:13px;color:#737373;">${i18n[currentLang].noResult}</div>`;
                    return;
                }
                filtered.forEach(song => {
                    const displayArt   = song.artworkUrlHigh || song.artworkUrl100;
                    const thumbnailArt = song.artworkUrl100;
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.onclick = () => selectSong(displayArt, song.trackName);
                    item.innerHTML = `
                        <img src="${thumbnailArt}" alt="앨범아트">
                        <div style="min-width:0;">
                            <div class="result-item-title">${song.trackName}</div>
                            <div class="result-item-artist">${song.artistName}</div>
                        </div>`;
                    resultsList.appendChild(item);
                });
            })
            .catch(() => {
                resultsList.innerHTML = `<div style="padding:13px;text-align:center;font-size:13px;color:#737373;">${i18n[currentLang].error}</div>`;
            });
    }

    // ── 곡 선택 ──
    function selectSong(artworkUrl, trackName) {
        // highlight (My Favorite)인 경우 처리
        if (currentBoxId === 'highlight-art') {
            document.getElementById('highlight-song-title').innerText = trackName;
            const art = document.getElementById('highlight-art');
            art.querySelector('.highlight-art-placeholder') &&
                (art.querySelector('.highlight-art-placeholder').style.display = 'none');
            fetchAndApplyArt(artworkUrl, null, art, 'highlight');
            return;
        }
        // 일반 그리드
        document.getElementById(currentTitleId).innerText = trackName;
        const box = document.getElementById(currentBoxId);
        box.classList.add('has-image');
        fetchAndApplyArt(artworkUrl, box, null, 'grid');
    }

    function fetchAndApplyArt(url, gridBox, highlightArt, type) {
        fetch(url)
            .then(r => r.blob())
            .then(blob => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    if (type === 'grid') {
                        gridBox.style.backgroundImage = `url('${reader.result}')`;
                    } else {
                        highlightArt.style.backgroundImage = `url('${reader.result}')`;
                    }
                    closeModal();
                };
                reader.readAsDataURL(blob);
            })
            .catch(() => {
                if (type === 'grid') gridBox.style.backgroundImage = `url('${url}')`;
                else highlightArt.style.backgroundImage = `url('${url}')`;
                closeModal();
            });
    }

    // ── 이미지 다운로드 (카메라 버튼) ──
    function downloadImage() {
        window.scrollTo(0, 0);
        const btn = document.getElementById('cameraBtn');
        btn.classList.add('saving');
        document.getElementById('hamburgerMenu').classList.remove('open');

        // html2canvas input 버그 우회:
        // input의 value를 bio 영역 전체를 감싸는 div에 텍스트로 렌더링
        const input = document.getElementById('usernameInput');
        const suffix = document.querySelector('.bio-suffix');
        const inputText = input.value || '';

        // bio 영역을 텍스트 전용 div로 임시 교체
        const bio = document.querySelector('.profile-bio');
        const originalHTML = bio.innerHTML;
        bio.innerHTML = `<div style="
            width: 100%;
            text-align: right;
            font-size: 13px;
            font-weight: 900;
            color: #262626;
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 0 14px 12px;
            box-sizing: border-box;
        ">${inputText}<span style="font-weight:600;">'s Playlist</span></div>`;

        setTimeout(() => {
            html2canvas(document.getElementById('captureArea'), {
                useCORS: true,
                scale: 2,
                backgroundColor: '#FFFFFF',
                logging: false,
                scrollX: -window.scrollX,
                scrollY: -window.scrollY
            }).then(canvas => {
                bio.innerHTML = originalHTML;
                btn.classList.remove('saving');
                const link = document.createElement('a');
                link.download = '취향의_재현.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(() => {
                bio.innerHTML = originalHTML;
                btn.classList.remove('saving');
                alert('이미지 저장 중 오류가 발생했습니다.');
            });
        }, 150);
    }

    window.onload = initGrid;
</script>

</body>
</html>
